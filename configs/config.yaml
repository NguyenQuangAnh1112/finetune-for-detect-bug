data_transformation:
  root_dir: artifacts/data_transformation
  source_data_file: artifacts/data_ingestion/PyresBugs.tsv
  tokenizer_name: meta-llama/Llama-3.1-8B-Instruct
  max_length: 2048
  test_size: 0.1
