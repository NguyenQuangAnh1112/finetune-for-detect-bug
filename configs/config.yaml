data_ingestion:
  root_dir: artifacts/data_ingestion
  huggingface_source_url: OSS-forge/PyResBugs
  local_data_file: artifacts/data_ingestion/PyresBugs.tsv

data_validation:
  root_dir: artifacts/data_validation
  status_file: artifacts/data_validation/status.txt
