name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"
      - name: Pytest
        run: |
          . .venv/bin/activate
          uv run pytest
